name: Commit Notification

on:
  push:
    branches: ['**']
  workflow_call:
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send Telegram Notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          AUTHOR=$(git log -1 --pretty=%an)
          BRANCH="${GITHUB_REF#refs/heads/}"
          SHORT_HASH=$(git rev-parse --short HEAD)
          REPO="${GITHUB_REPOSITORY}"

          python3 - "$COMMIT_MSG" "$AUTHOR" "$BRANCH" "$SHORT_HASH" "$REPO" <<'EOF'
import urllib.request, json, os, sys

token    = os.environ['TELEGRAM_BOT_TOKEN']
chat_id  = os.environ['TELEGRAM_CHAT_ID']

commit_msg, author, branch, short_hash, repo = sys.argv[1:]

text = (
    f"<b>Git Push</b>\n"
    f"Repo  : <code>{repo}</code>\n"
    f"Branch: <code>{branch}</code>\n"
    f"Commit: <code>{short_hash}</code>\n"
    f"Author: {author}\n\n"
    f"{commit_msg}"
)

payload = json.dumps({
    'chat_id':    chat_id,
    'text':       text,
    'parse_mode': 'HTML'
}).encode('utf-8')

req = urllib.request.Request(
    f'https://api.telegram.org/bot{token}/sendMessage',
    data=payload,
    headers={'Content-Type': 'application/json; charset=utf-8'}
)
urllib.request.urlopen(req)
print('Telegram notification sent!')
EOF
